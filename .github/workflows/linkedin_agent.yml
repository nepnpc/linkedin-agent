name: LinkedIn Agent

on:
  schedule:
    - cron: '0 */4 * * *'   # Runs at 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
  workflow_dispatch:          # Allows manual trigger from GitHub Actions UI

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Required to commit post_history.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        run: python agent.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_URN: ${{ secrets.LINKEDIN_URN }}
          GITHUB_USERNAME: ${{ secrets.G_USERNAME }}

      - name: Commit post history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add post_history.json
          git diff --staged --quiet || git commit -m "chore: update post history [skip ci]"
          git push
